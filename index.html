<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>FOOD MENU -APP</title>

    <link rel="shortcut icon" type="image/png" href="assets/images/favicon.png" />
    <link rel="icon" href="assets/images/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel=stylesheet href=css/owl.css>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0, minimum-scale=1.0, maximum-scale=1.0">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>

<body>
    <div class="page">
        <!-- header -->
        <div class="top-page-header">
            <div class="cart-and-back">
                <div class="back-button"><a><i class='fas fa-chevron-left'></i></a></div>
                <div class="cart-button"><a><i class="fa fa-shopping-basket"></i></a></div>
            </div>
            <!-- HEADER  -->
            <div class="restaurant-menu-header-freeze">
                <div class="restaurant-menu-filter-icon" id="restaurant-menu-filter-btn">
                    <a class="hamburger">
                        <div class="hamburger-inner"></div>
                    </a>
                </div>
                <div class="menu-categories">
                    <ul>
                        <!-- Menu categories will be loaded here from JSON -->
                    </ul>
                </div>
                <!-- FILTER MENU  -->
            </div>
            <!-- HEADER  -->
        </div>

        <main class="home-slider">
            <div class="owl-carousel" id="main-slider">
                <div class="slider-item">
                    <div class="slider-image">
                        <img src="https://dine-out-web.netlify.app/menu/slider-1.jpg">
                    </div>
                </div>
                <div class="slider-item">
                    <div class="slider-image">
                        <img src="https://dine-out-web.netlify.app/menu/slider-1.jpg">
                    </div>
                </div>
                <div class="slider-item">
                    <div class="slider-image">
                        <img src="https://dine-out-web.netlify.app/menu/slider-1.jpg">
                    </div>
                </div>
                <div class="slider-item">
                    <div class="slider-image">
                        <img src="https://dine-out-web.netlify.app/menu/slider-1.jpg">
                    </div>
                </div>
            </div>
        </main>
        
        <section class="shop-tabs">
            <nav class="nav js-nav">
                <ul class="nav__list">
                    <li class="nav__item active-tab">
                        <a href="#" class="nav__link nav__link_active" data-transform="0">Overview</a>
                    </li>
                    <li class="nav__item">
                        <a href="#" class="nav__link" data-transform="100">Menu</a>
                    </li>
                    <li class="nav__item">
                        <a href="#" class="nav__link" data-transform="200">Reviews</a>
                    </li>
                </ul>
                <div class="nav__slider">
                    <div class="nav__slider-rect"></div>
                </div>
            </nav>
            <div class="tabs-wrap">
                <div class="tab-contents">
                    <div class="tab-content-item">
                        <div class="overview-container">
                            <div class="restaurant-header">
                                <h2><!-- Restaurant name will be loaded here --></h2>
                                <p><span><i class="fa fa-map-marker-alt"></i></span> <!-- Location will be loaded here --></p>
                                <p><span><i class="fa fa-clock"></i></span> <!-- Hours will be loaded here --></p>
                                <div class="ratings-and-distance">
                                    <div class="rating">
                                        <ul>
                                            <li><i class="fa fa-star"></i></li>
                                            <li><i class="fa fa-star"></i></li>
                                            <li><i class="fa fa-star"></i></li>
                                            <li><i class="fa fa-star"></i></li>
                                            <li><i class="fa fa-star"></i></li>
                                        </ul>
                                        <span><!-- Rating will be loaded here --></span>
                                    </div>
                                    <p class="distance"><!-- Distance will be loaded here --></p>
                                </div>
                            </div>
                            <div class="restaurant-details">
                                <ul>
                                    <li>
                                        <div class="detail-icon"><i class="fa fa-soup"></i></div>
                                        <h3>Cuisine</h3>
                                        <p><!-- Cuisine will be loaded here --></p>
                                    </li>
                                    <li>
                                        <div class="detail-icon"><i class="fa fa-tag"></i></div>
                                        <h3>Average Cost</h3>
                                        <p><!-- Average cost will be loaded here --></p>
                                    </li>
                                    <li>
                                        <h3>Facilities & Features</h3>
                                        <p><!-- Facilities will be loaded here --></p>
                                    </li>
                                    <li>
                                        <h3>Services</h3>
                                        <p><!-- Services will be loaded here --></p>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="tab-content-item restaurant-menu">
                        <!-- HEADER  -->
                        <div class="restaurant-menu-header">
                            <div class="restaurant-menu-filter-icon" id="restaurant-menu-filter-btn">
                                <a class="hamburger">
                                    <div class="hamburger-inner"></div>
                                </a>
                            </div>
                            <div class="menu-categories">
                                <ul>
                                    <!-- Menu categories will be loaded here from JSON -->
                                </ul>
                            </div>
                            <!-- FILTER MENU  -->
                        </div>
                        <!-- HEADER  -->

                        <!-- MENU FOODS  -->
                        <div class="menu-foods">
                            <!-- Menu sections will be loaded here from JSON -->
                        </div>
                    </div>
                    <div class="tab-content-item">
                        <div class="reviews-container">
                            <div class="review-list">
                                <ul>
                                    <!-- Reviews will be loaded here from JSON -->
                                </ul>
                            </div>
                            <div class="add-review-btn-area">
                                <button mat-button class="add-review-btn">Add Review</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <div class="restaurant-menu-filter">
            <ul>
                <!-- Filter menu options will be loaded here from JSON -->
            </ul>
        </div>
        <div class="restaurant-menu-filter-overlay"></div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="js/owl.js"></script>
    <script src="js/index.js"></script>
    <script src="menuloader.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init()
    </script>
</body>

</html>
