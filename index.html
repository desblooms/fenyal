<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Login - Tasty Bites</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Theme configuration -->
    <script src="assets/js/themecolor.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/app.css">
    
    <!-- Feather Icons -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
</head>
<body class="bg-background font-sans text-dark">
    <div class="app-container p-6">
        <!-- Back button -->
        <div class="mb-6">
            <button onclick="window.history.back()" class="p-2 rounded-full bg-white shadow-sm">
                <i data-feather="arrow-left" class="h-6 w-6"></i>
            </button>
        </div>
        
        <!-- Header -->
        <header class="mb-10 text-center">
            <h1 class="text-2xl font-bold mb-2">Login to your account</h1>
            <p class="text-gray-600">Enter your phone number to continue</p>
        </header>
        
        <!-- Login form -->
        <form id="login-form" class="mb-8">
            <div class="mb-6">
                <label for="phone" class="block text-gray-700 text-sm font-medium mb-2">Phone Number</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <span class="text-gray-500">+91</span>
                    </div>
                    <input type="tel" id="phone" name="phone" 
                           class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-primary transition"
                           placeholder="Enter 10 digit mobile number"
                           maxlength="10"
                           pattern="[0-9]{10}"
                           required>
                </div>
                <p class="mt-2 text-xs text-gray-500">We'll send a verification code to this number</p>
            </div>
            
            <button type="submit" 
                    class="w-full bg-primary text-white font-semibold py-3 px-6 rounded-xl shadow-md transform transition active:scale-95">
                Continue
            </button>
        </form>
        
        <!-- Divider -->
        <div class="flex items-center my-8">
            <div class="flex-1 h-px bg-gray-300"></div>
            <p class="mx-4 text-gray-500 text-sm">or continue with</p>
            <div class="flex-1 h-px bg-gray-300"></div>
        </div>
        
        <!-- Social login buttons -->
        <div class="grid grid-cols-2 gap-4 mb-8">
            <button class="bg-white p-3 rounded-xl border border-gray-300 flex items-center justify-center shadow-sm transform transition active:scale-95">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v4/icons/google.svg" alt="Google" class="h-6 w-6 mr-2">
                <span>Google</span>
            </button>
            <button class="bg-white p-3 rounded-xl border border-gray-300 flex items-center justify-center shadow-sm transform transition active:scale-95">
                <img src="https://cdn.jsdelivr.net/npm/simple-icons@v4/icons/whatsapp.svg" alt="WhatsApp" class="h-6 w-6 mr-2">
                <span>WhatsApp</span>
            </button>
        </div>
        
        <!-- Skip login -->
        <div class="text-center">
            <button onclick="location.href='menu.html'" class="text-primary font-medium">
                Skip login and browse menu
            </button>
        </div>
    </div>
    
    <!-- Script -->
    <script type="module">
        import { pageTransition, toast, validateForm } from './assets/js/app.js';
        
        // Initialize icons
        feather.replace();
        
        // Handle form submission
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validate form
            if (validateForm(this)) {
                const phone = document.getElementById('phone').value;
                
                // Basic validation
                if (phone.length !== 10 || !/^\d+$/.test(phone)) {
                    toast.show('Please enter a valid 10-digit phone number', 'error');
                    return;
                }
                
                // Store phone in localStorage
                localStorage.setItem('userPhone', phone);
                
                // Redirect to OTP screen
                pageTransition('otp.html');
            }
        });
        
        // Format phone number input
        const phoneInput = document.getElementById('phone');
        
        phoneInput.addEventListener('input', function() {
            // Remove any non-numeric characters
            this.value = this.value.replace(/\D/g, '');
            
            // Limit to 10 digits
            if (this.value.length > 10) {
                this.value = this.value.slice(0, 10);
            }
        });
    </script>
</body>
</html>
