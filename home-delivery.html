<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Home Delivery - Tasty Bites</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Theme configuration -->
    <script src="assets/js/themecolor.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/app.css">
    
    <!-- Feather Icons -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            line-height: 1.3;
        }
        .app-container::-webkit-scrollbar {
            display: none;
        }
        .status-bar {
            height: 24px;
            font-size: 12px;
        }
        .scroll-touch {
            -webkit-overflow-scrolling: touch;
        }
        .bottom-safe-area {
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
        .form-input:focus {
            border-color: #c45230;
            outline: none;
            box-shadow: 0 0 0 2px rgba(196, 82, 48, 0.2);
        }
        .form-label {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 0.25rem;
            display: block;
        }
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            background-color: white;
            font-size: 0.9375rem;
            transition: all 0.2s;
        }
        .form-input.error {
            border-color: #ef4444;
        }
        .error-text {
            color: #ef4444;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        .time-option {
            transition: all 0.2s ease;
        }
        .time-option.selected {
            background-color: #c45230;
            color: white;
        }
        .delivery-method-option {
            transition: all 0.2s ease;
        }
        .delivery-method-option.selected {
            border-color: #c45230;
            background-color: rgba(196, 82, 48, 0.05);
        }
        .delivery-method-option.selected .check-icon {
            display: flex;
        }
        .check-icon {
            display: none;
        }
    </style>
</head>
<body class="bg-background font-sans text-dark">
    <!-- Main app container -->
    <div class="app-container pt-4 pb-24 scroll-touch">
        <!-- Header -->
        <header class="sticky top-0 z-30 bg-background/95 backdrop-blur-sm pt-4 px-4 pb-2">
            <div class="flex items-center">
                <a href="cart.html" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center mr-4 transform transition-transform active:scale-95">
                    <i data-feather="arrow-left" class="h-5 w-5 text-gray-600"></i>
                </a>
                <h1 class="text-xl font-semibold">Home Delivery</h1>
            </div>
        </header>
        
        <!-- Main content -->
        <main class="px-4 pt-2">
            <!-- Delivery Address Form -->
            <form id="delivery-form" class="mb-24">
                <!-- Address Type Selection -->
                <div class="mb-6">
                    <h2 class="text-lg font-semibold mb-3">Delivery Address</h2>
                    <div class="flex space-x-2 mb-4">
                        <button type="button" class="delivery-method-option selected px-4 py-2 rounded-xl border-2 border-primary bg-primary/5 flex-1 flex items-center justify-center space-x-2 relative">
                            <i data-feather="home" class="h-4 w-4 text-primary"></i>
                            <span class="font-medium text-sm">Home</span>
                            <div class="check-icon absolute top-1 right-1 w-4 h-4 rounded-full bg-primary items-center justify-center">
                                <i data-feather="check" class="h-3 w-3 text-white"></i>
                            </div>
                        </button>
                        <button type="button" class="delivery-method-option px-4 py-2 rounded-xl border-2 border-gray-200 flex-1 flex items-center justify-center space-x-2 relative">
                            <i data-feather="briefcase" class="h-4 w-4 text-gray-500"></i>
                            <span class="font-medium text-sm">Work</span>
                            <div class="check-icon absolute top-1 right-1 w-4 h-4 rounded-full bg-primary items-center justify-center">
                                <i data-feather="check" class="h-3 w-3 text-white"></i>
                            </div>
                        </button>
                        <button type="button" class="delivery-method-option px-4 py-2 rounded-xl border-2 border-gray-200 flex-1 flex items-center justify-center space-x-2 relative">
                            <i data-feather="map-pin" class="h-4 w-4 text-gray-500"></i>
                            <span class="font-medium text-sm">Other</span>
                            <div class="check-icon absolute top-1 right-1 w-4 h-4 rounded-full bg-primary items-center justify-center">
                                <i data-feather="check" class="h-3 w-3 text-white"></i>
                            </div>
                        </button>
                    </div>
                
                    <!-- Contact details -->
                    <div class="mb-4">
                        <div class="mb-4">
                            <label for="full-name" class="form-label">Full Name</label>
                            <input type="text" id="full-name" class="form-input" placeholder="Enter your full name" required>
                        </div>
                        <div class="mb-4">
                            <label for="phone" class="form-label">Phone Number</label>
                            <input type="tel" id="phone" class="form-input" placeholder="Enter your phone number" required>
                        </div>
                    </div>
                    
                    <!-- Current Location -->
                    <div class="mb-4">
                        <button type="button" id="get-location-btn" class="w-full flex items-center justify-center space-x-2 bg-gray-100 py-3 px-4 rounded-xl border border-gray-200 text-gray-700 transform transition-transform active:scale-95">
                            <i data-feather="navigation" class="h-5 w-5 text-primary"></i>
                            <span class="font-medium">Use Current Location</span>
                        </button>
                    </div>
                    
                    <!-- Address details -->
                    <div class="space-y-4">
                        <div>
                            <label for="address-line1" class="form-label">Address Line 1</label>
                            <input type="text" id="address-line1" class="form-input" placeholder="House No., Building Name" required>
                        </div>
                        <div>
                            <label for="address-line2" class="form-label">Address Line 2</label>
                            <input type="text" id="address-line2" class="form-input" placeholder="Street, Area" required>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label for="city" class="form-label">City</label>
                                <input type="text" id="city" class="form-input" placeholder="City" value="Malappuram" required>
                            </div>
                            <div>
                                <label for="pincode" class="form-label">Pincode</label>
                                <input type="text" id="pincode" class="form-input" placeholder="Pincode" required>
                            </div>
                        </div>
                        <div>
                            <label for="landmark" class="form-label">Landmark (Optional)</label>
                            <input type="text" id="landmark" class="form-input" placeholder="Nearby landmark">
                        </div>
                    </div>
                </div>
                
                <!-- Delivery Time Selection -->
                <div class="mb-6">
                    <h2 class="text-lg font-semibold mb-3">Delivery Time</h2>
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <button type="button" class="time-option selected flex flex-col items-center justify-center py-3 px-2 rounded-xl border-2 border-primary bg-primary text-white">
                            <span class="text-xs font-medium">ASAP</span>
                            <span class="text-sm font-semibold">30-45 mins</span>
                        </button>
                        <button type="button" class="time-option flex flex-col items-center justify-center py-3 px-2 rounded-xl border-2 border-gray-200">
                            <span class="text-xs font-medium">Schedule</span>
                            <span class="text-sm font-semibold">For Later</span>
                        </button>
                    </div>
                    
                    <!-- Schedule Options (Hidden by default) -->
                    <div id="schedule-options" class="hidden">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label for="delivery-date" class="form-label">Date</label>
                                <select id="delivery-date" class="form-input">
                                    <option value="today">Today</option>
                                    <option value="tomorrow">Tomorrow</option>
                                </select>
                            </div>
                            <div>
                                <label for="delivery-time" class="form-label">Time</label>
                                <select id="delivery-time" class="form-input">
                                    <option value="12:00">12:00 PM - 12:30 PM</option>
                                    <option value="12:30">12:30 PM - 1:00 PM</option>
                                    <option value="13:00">1:00 PM - 1:30 PM</option>
                                    <option value="13:30">1:30 PM - 2:00 PM</option>
                                    <option value="18:00">6:00 PM - 6:30 PM</option>
                                    <option value="18:30">6:30 PM - 7:00 PM</option>
                                    <option value="19:00">7:00 PM - 7:30 PM</option>
                                    <option value="19:30">7:30 PM - 8:00 PM</option>
                                    <option value="20:00">8:00 PM - 8:30 PM</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Delivery Instructions -->
                <div class="mb-6">
                    <h2 class="text-lg font-semibold mb-3">Delivery Instructions</h2>
                    <textarea id="delivery-instructions" class="form-input" placeholder="Any specific delivery instructions?" rows="2"></textarea>
                </div>
                
                <!-- Save Address -->
                <div class="mb-6 flex items-center">
                    <input type="checkbox" id="save-address" class="w-5 h-5 text-primary rounded border-gray-300 focus:ring-primary">
                    <label for="save-address" class="ml-2 text-sm text-gray-700">Save this address for future orders</label>
                </div>
            </form>
        </main>
        
        <!-- Sticky proceed button -->
        <div class="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-[0_-4px_12px_rgba(0,0,0,0.08)] rounded-t-xl z-40 bottom-safe-area">
            <div class="flex items-center justify-between mb-3">
                <div>
                    <p class="text-sm text-gray-500">Delivery Fee</p>
                    <p class="font-medium">₹30</p>
                </div>
                <div>
                    <p class="text-sm text-gray-500">Estimated Time</p>
                    <p class="font-medium">30-45 mins</p>
                </div>
            </div>
            <button id="proceed-btn" class="w-full bg-primary text-white font-medium py-3.5 rounded-xl flex items-center justify-center transform transition-transform active:scale-95">
                Proceed to Payment
                <i data-feather="arrow-right" class="h-5 w-5 ml-2"></i>
            </button>
        </div>
    </div>
    
    <!-- Loading overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="flex flex-col items-center">
            <div class="w-12 h-12 rounded-full border-4 border-primary border-t-transparent animate-spin mb-4"></div>
            <p class="text-gray-700 font-medium">Getting your location...</p>
        </div>
    </div>
    
    <!-- Custom JavaScript -->
    <script type="module">
        import { pageTransition, toast, validateForm, showLoading, hideLoading } from './assets/js/app.js';
        
        // Initialize icons
        feather.replace();
        
        // DOM Elements
        const deliveryMethodOptions = document.querySelectorAll('.delivery-method-option');
        const timeOptions = document.querySelectorAll('.time-option');
        const scheduleOptions = document.getElementById('schedule-options');
        const getLocationBtn = document.getElementById('get-location-btn');
        const loadingOverlay = document.getElementById('loading-overlay');
        const deliveryForm = document.getElementById('delivery-form');
        const proceedBtn = document.getElementById('proceed-btn');
        
        // Handle delivery method selection
        deliveryMethodOptions.forEach(option => {
            option.addEventListener('click', function() {
                // Remove selected class from all options
                deliveryMethodOptions.forEach(opt => opt.classList.remove('selected'));
                
                // Add selected class to clicked option
                this.classList.add('selected');
            });
        });
        
        // Handle time option selection
        timeOptions.forEach((option, index) => {
            option.addEventListener('click', function() {
                // Remove selected class from all options
                timeOptions.forEach(opt => {
                    opt.classList.remove('selected', 'bg-primary', 'text-white');
                    opt.classList.add('border-gray-200');
                });
                
                // Add selected class to clicked option
                this.classList.add('selected', 'bg-primary', 'text-white');
                this.classList.remove('border-gray-200');
                
                // Show/hide schedule options
                if (index === 1) { // Schedule option
                    scheduleOptions.classList.remove('hidden');
                } else {
                    scheduleOptions.classList.add('hidden');
                }
            });
        });
        
        // Handle get location button
        getLocationBtn.addEventListener('click', function() {
            // Show loading overlay
            loadingOverlay.classList.remove('hidden');
            
            // Check if geolocation is available
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    // Success
                    position => {
                        // Here you would typically use the coordinates to get the address
                        // using a geocoding service like Google Maps API
                        // For demo purposes, we'll just simulate it
                        setTimeout(() => {
                            // Hide loading overlay
                            loadingOverlay.classList.add('hidden');
                            
                            // Fill address fields with sample data
                            document.getElementById('address-line1').value = '123 Main Street';
                            document.getElementById('address-line2').value = 'Downhill Road';
                            document.getElementById('city').value = 'Malappuram';
                            document.getElementById('pincode').value = '676505';
                            
                            // Show success toast
                            toast.show('Location detected successfully', 'success');
                        }, 1500);
                    },
                    // Error
                    error => {
                        // Hide loading overlay
                        loadingOverlay.classList.add('hidden');
                        
                        // Show error toast
                        toast.show('Failed to get your location. Please enter manually.', 'error');
                        console.error('Error getting location:', error);
                    }
                );
            } else {
                // Hide loading overlay
                loadingOverlay.classList.add('hidden');
                
                // Show error toast
                toast.show('Geolocation is not supported by your browser', 'error');
            }
        });
        
        // Form validation
        proceedBtn.addEventListener('click', function() {
            // Validate form
            if (validateForm(deliveryForm)) {
                // Show loading
                showLoading();
                
                // Collect form data
                const formData = {
                    addressType: document.querySelector('.delivery-method-option.selected').textContent.trim(),
                    fullName: document.getElementById('full-name').value,
                    phone: document.getElementById('phone').value,
                    addressLine1: document.getElementById('address-line1').value,
                    addressLine2: document.getElementById('address-line2').value,
                    city: document.getElementById('city').value,
                    pincode: document.getElementById('pincode').value,
                    landmark: document.getElementById('landmark').value,
                    timeOption: document.querySelector('.time-option.selected').textContent.includes('ASAP') ? 'ASAP' : 'Scheduled',
                    deliveryInstructions: document.getElementById('delivery-instructions').value,
                    saveAddress: document.getElementById('save-address').checked
                };
                
                // Add scheduled time if selected
                if (formData.timeOption === 'Scheduled') {
                    formData.deliveryDate = document.getElementById('delivery-date').value;
                    formData.deliveryTime = document.getElementById('delivery-time').value;
                }
                
                // Save to sessionStorage for use in checkout
                sessionStorage.setItem('deliveryDetails', JSON.stringify(formData));
                
                // Simulate processing delay
                setTimeout(() => {
                    // Hide loading
                    hideLoading();
                    
                    // Navigate to checkout
                    pageTransition('checkout/checkout-payment.html');
                }, 1000);
            } else {
                // Show error toast
                toast.show('Please fill all required fields', 'error');
            }
        });
        
        // Phone number formatting
        const phoneInput = document.getElementById('phone');
        phoneInput.addEventListener('input', function(e) {
            let input = e.target.value.replace(/\D/g, '');
            
            // Limit to 10 digits
            if (input.length > 10) {
                input = input.substring(0, 10);
            }
            
            // Format as XXX-XXX-XXXX
            let formatted = '';
            for (let i = 0; i < input.length; i++) {
                if (i === 3 || i === 6) {
                    formatted += '-';
                }
                formatted += input[i];
            }
            
            e.target.value = formatted;
        });
        
        // Load saved data if any
        document.addEventListener('DOMContentLoaded', function() {
            const savedData = sessionStorage.getItem('deliveryDetails');
            
            if (savedData) {
                const data = JSON.parse(savedData);
                
                // Fill form fields with saved data
                document.getElementById('full-name').value = data.fullName || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('address-line1').value = data.addressLine1 || '';
                document.getElementById('address-line2').value = data.addressLine2 || '';
                document.getElementById('city').value = data.city || 'Malappuram';
                document.getElementById('pincode').value = data.pincode || '';
                document.getElementById('landmark').value = data.landmark || '';
                document.getElementById('delivery-instructions').value = data.deliveryInstructions || '';
                document.getElementById('save-address').checked = data.saveAddress || false;
                
                // Set address type
                deliveryMethodOptions.forEach(option => {
                    const optionText = option.textContent.trim();
                    if (optionText.includes(data.addressType)) {
                        deliveryMethodOptions.forEach(opt => opt.classList.remove('selected'));
                        option.classList.add('selected');
                    }
                });
                
                // Set time option
                if (data.timeOption === 'Scheduled') {
                    timeOptions[1].click(); // Click the schedule option
                    if (data.deliveryDate) {
                        document.getElementById('delivery-date').value = data.deliveryDate;
                    }
                    if (data.deliveryTime) {
                        document.getElementById('delivery-time').value = data.deliveryTime;
                    }
                }
            }
        });
    </script>
</body>
</html>
