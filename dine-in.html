<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Dine-in - Tasty Bites</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Theme configuration -->
    <script src="assets/js/themecolor.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/app.css">
    
    <!-- Feather Icons -->
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            line-height: 1.3;
        }
        .app-container::-webkit-scrollbar {
            display: none;
        }
        .status-bar {
            height: 24px;
            font-size: 12px;
        }
        .scroll-touch {
            -webkit-overflow-scrolling: touch;
        }
        .bottom-safe-area {
            padding-bottom: env(safe-area-inset-bottom, 16px);
        }
        .form-input:focus {
            border-color: #c45230;
            outline: none;
            box-shadow: 0 0 0 2px rgba(196, 82, 48, 0.2);
        }
        .table-button {
            transition: all 0.2s ease;
        }
        .table-button.selected {
            background-color: #c45230;
            color: white;
            border-color: #c45230;
        }
        .qr-scanner-overlay {
            background: linear-gradient(to right, #c45230 4px, transparent 4px) 0 0,
                linear-gradient(to right, #c45230 4px, transparent 4px) 0 100%,
                linear-gradient(to left, #c45230 4px, transparent 4px) 100% 0,
                linear-gradient(to left, #c45230 4px, transparent 4px) 100% 100%,
                linear-gradient(to bottom, #c45230 4px, transparent 4px) 0 0,
                linear-gradient(to bottom, #c45230 4px, transparent 4px) 100% 0,
                linear-gradient(to top, #c45230 4px, transparent 4px) 0 100%,
                linear-gradient(to top, #c45230 4px, transparent 4px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-background font-sans text-dark">
    <!-- Main app container -->
    <div class="app-container pt-4 pb-24 scroll-touch">
        <!-- Header -->
        <header class="sticky top-0 z-30 bg-background/95 backdrop-blur-sm pt-4 pb-2 px-4">
            <div class="flex items-center justify-between mb-2">
                <a href="cart.html" class="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center">
                    <i data-feather="arrow-left" class="h-5 w-5 text-gray-600"></i>
                </a>
                <h1 class="text-xl font-semibold">Dine-in</h1>
                <div class="w-10 h-10"></div>
            </div>
        </header>
        
        <!-- Main content -->
        <main class="px-4 pt-2">
            <!-- Info section -->
            <div class="bg-white rounded-xl p-4 shadow-sm mb-6">
                <div class="flex items-start">
                    <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center mr-3 flex-shrink-0">
                        <i data-feather="info" class="h-5 w-5 text-primary"></i>
                    </div>
                    <div>
                        <h3 class="font-medium text-base mb-1">Dine-in Instructions</h3>
                        <p class="text-gray-600 text-sm">Please enter your table number or scan the QR code on your table to place your order.</p>
                    </div>
                </div>
            </div>
            
            <!-- Table number section -->
            <div class="mb-6">
                <h2 class="text-lg font-semibold mb-3">Select Your Table</h2>
                
                <div class="grid grid-cols-4 gap-2 mb-4">
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">01</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">02</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">03</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">04</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">05</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">06</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">07</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">08</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">09</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">10</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">11</button>
                    <button class="table-button h-14 rounded-lg border border-gray-200 flex items-center justify-center font-medium">12</button>
                </div>
                
                <div class="mb-6">
                    <label for="custom-table" class="block text-sm font-medium text-gray-700 mb-1">Or enter table number manually:</label>
                    <div class="flex">
                        <input type="text" id="custom-table" class="form-input w-full border border-gray-300 rounded-l-xl p-3 text-sm focus:outline-none" placeholder="Enter table number">
                        <button id="confirm-table-btn" class="bg-primary text-white font-medium px-4 rounded-r-xl text-sm flex items-center justify-center">
                            Confirm
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- QR Code scanner section -->
            <div class="mb-6">
                <h2 class="text-lg font-semibold mb-3">Scan Table QR Code</h2>
                <div class="bg-white rounded-xl p-4 shadow-sm mb-4">
                    <div class="aspect-square w-full bg-gray-100 rounded-lg flex flex-col items-center justify-center mb-3 relative">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <div class="w-3/4 h-3/4 qr-scanner-overlay"></div>
                        </div>
                        <i data-feather="camera" class="h-12 w-12 text-gray-400 mb-2"></i>
                        <p class="text-sm text-gray-500 text-center px-8">Point your camera at the QR code on your table</p>
                    </div>
                    <button id="open-camera-btn" class="w-full bg-gray-800 text-white font-medium py-3 rounded-xl flex items-center justify-center">
                        <i data-feather="camera" class="h-5 w-5 mr-2"></i>
                        Open Camera
                    </button>
                </div>
            </div>
        </main>
        
        <!-- Bottom navigation -->
        <div class="fixed bottom-0 left-0 right-0 bg-white shadow-lg p-4 bottom-safe-area z-50">
            <button id="proceed-btn" class="w-full bg-primary text-white font-medium py-3.5 rounded-xl flex items-center justify-center opacity-50 pointer-events-none transition-opacity duration-300">
                Continue
                <i data-feather="arrow-right" class="h-5 w-5 ml-2"></i>
            </button>
        </div>
    </div>
    
    <!-- Custom JavaScript -->
    <script type="module">
        import { pageTransition, toast } from './assets/js/app.js';
        
        // Initialize icons
        feather.replace();
        
        // Selected table tracking
        let selectedTable = null;
        
        // Handle table button clicks
        const tableButtons = document.querySelectorAll('.table-button');
        tableButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove selection from all buttons
                tableButtons.forEach(btn => btn.classList.remove('selected'));
                
                // Add selection to clicked button
                this.classList.add('selected');
                
                // Update selected table
                selectedTable = this.textContent;
                
                // Enable proceed button
                enableProceedButton();
            });
        });
        
        // Handle custom table input
        const customTableInput = document.getElementById('custom-table');
        const confirmTableBtn = document.getElementById('confirm-table-btn');
        
        confirmTableBtn.addEventListener('click', function() {
            const tableNumber = customTableInput.value.trim();
            
            if (tableNumber === '') {
                toast.show('Please enter a table number', 'error');
                return;
            }
            
            // Clear any previous selections
            tableButtons.forEach(btn => btn.classList.remove('selected'));
            
            // Update selected table
            selectedTable = tableNumber;
            
            // Show confirmation
            toast.show(`Table ${tableNumber} selected`, 'success');
            
            // Enable proceed button
            enableProceedButton();
        });
        
        // Camera button (simulated)
        const openCameraBtn = document.getElementById('open-camera-btn');
        openCameraBtn.addEventListener('click', function() {
            toast.show('Camera functionality is simulated in this demo', 'info');
            
            // Simulate scanning after a short delay
            setTimeout(() => {
                const randomTable = Math.floor(Math.random() * 12) + 1;
                selectedTable = randomTable.toString().padStart(2, '0');
                
                // Update UI to show the selected table
                tableButtons.forEach(btn => {
                    if (btn.textContent === selectedTable) {
                        btn.classList.add('selected');
                        // Scroll to the button to make it visible
                        btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    } else {
                        btn.classList.remove('selected');
                    }
                });
                
                toast.show(`QR code scanned: Table ${selectedTable}`, 'success');
                
                // Enable proceed button
                enableProceedButton();
            }, 1500);
        });
        
        // Enable proceed button when a table is selected
        function enableProceedButton() {
            const proceedBtn = document.getElementById('proceed-btn');
            proceedBtn.classList.remove('opacity-50', 'pointer-events-none');
            
            // Store selected table in session storage
            sessionStorage.setItem('selectedTable', selectedTable);
        }
        
        // Handle proceed button
        const proceedBtn = document.getElementById('proceed-btn');
        proceedBtn.addEventListener('click', function() {
            if (selectedTable) {
                pageTransition('checkout/checkout.html');
            } else {
                toast.show('Please select a table first', 'error');
            }
        });
        
        // Check if a table has already been selected
        document.addEventListener('DOMContentLoaded', function() {
            const storedTable = sessionStorage.getItem('selectedTable');
            
            if (storedTable) {
                // Update UI to show the previously selected table
                tableButtons.forEach(btn => {
                    if (btn.textContent === storedTable) {
                        btn.classList.add('selected');
                        selectedTable = storedTable;
                    }
                });
                
                // If it's not one of the preset tables, populate the custom input
                if (!Array.from(tableButtons).some(btn => btn.textContent === storedTable)) {
                    customTableInput.value = storedTable;
                    selectedTable = storedTable;
                }
                
                // Enable proceed button
                enableProceedButton();
            }
        });
    </script>
</body>
</html>
