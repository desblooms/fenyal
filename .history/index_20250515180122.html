<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TastyBites</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff5722',
                        accent: '#ffc107',
                        background: '#f8f8f8',
                        dark: '#1a1a1a'
                    },
                    fontFamily: {
                        sans: ['"Poppins"', 'sans-serif']
                    },
                    borderRadius: {
                        xl: '1.5rem'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        .splash-animation {
            animation: fadeIn 1.5s ease-in-out;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .pulse-button {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 87, 34, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 87, 34, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 87, 34, 0); }
        }
    </style>
</head>
<body class="h-screen overflow-hidden bg-background font-sans">
    <div class="flex flex-col items-center justify-center h-full px-6 py-8 splash-animation">
        <!-- Logo container -->
        <div class="mb-16 text-center">
            <div class="inline-block p-4 mb-3 rounded-full bg-primary shadow-lg">
                <i class="fas fa-utensils text-5xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold text-dark mb-2">TastyBites</h1>
            <p class="text-gray-600">Delicious food at your fingertips</p>
        </div>
        
        <!-- Features highlights -->
        <div class="w-full mb-12">
            <div class="flex mb-6">
                <div class="w-12 h-12 rounded-full bg-accent/20 flex items-center justify-center text-accent mr-4 flex-shrink-0">
                    <i class="fas fa-clock"></i>
                </div>
                <div>
                    <h3 class="font-semibold text-dark">Quick Ordering</h3>
                    <p class="text-sm text-gray-600">Order your favorite meals in just a few taps</p>
                </div>
            </div>
            
            <div class="flex mb-6">
                <div class="w-12 h-12 rounded-full bg-primary/20 flex items-center justify-center text-primary mr-4 flex-shrink-0">
                    <i class="fas fa-map-marker-alt"></i>
                </div>
                <div>
                    <h3 class="font-semibold text-dark">Easy Delivery</h3>
                    <p class="text-sm text-gray-600">Get food delivered to your doorstep</p>
                </div>
            </div>
            
            <div class="flex">
                <div class="w-12 h-12 rounded-full bg-green-100 flex items-center justify-center text-green-600 mr-4 flex-shrink-0">
                    <i class="fas fa-tag"></i>
                </div>
                <div>
                    <h3 class="font-semibold text-dark">Exclusive Offers</h3>
                    <p class="text-sm text-gray-600">Enjoy special discounts and promotions</p>
                </div>
            </div>
        </div>
        
        <!-- CTA Button -->
        <a href="login.html" class="w-full">
            <button class="w-full py-4 bg-primary text-white font-semibold rounded-xl shadow-lg transform transition hover:scale-105 active:scale-95 pulse-button">
                Get Started
            </button>
        </a>
        
        <p class="mt-6 text-xs text-center text-gray-500">
            By continuing, you agree to our Terms of Service & Privacy Policy
        </p>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
